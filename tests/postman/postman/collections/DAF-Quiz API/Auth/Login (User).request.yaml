$kind: http-request
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "{{userEmail}}",
      "password": "{{userPassword}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const j = pm.response.json();
      pm.test('Has tokens', () => {
        pm.expect(j.accessToken).to.be.a('string').and.not.empty;
        pm.expect(j.refreshToken).to.be.a('string').and.not.empty;
      });
      pm.test('ExpiresIn is 900', () => pm.expect(j.expiresIn).to.equal(900));
      pm.environment.set('accessToken', j.accessToken);
      pm.environment.set('refreshToken', j.refreshToken);
    language: text/javascript
order: 2000
