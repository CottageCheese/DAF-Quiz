$kind: http-request
url: "{{baseUrl}}/api/auth/revoke"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "refreshToken": "{{refreshToken}}"
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: pm.test('Status 204', () => pm.response.to.have.status(204));
    language: text/javascript
order: 4000
