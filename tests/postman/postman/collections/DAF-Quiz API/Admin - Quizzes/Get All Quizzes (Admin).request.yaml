$kind: http-request
url: "{{baseUrl}}/api/admin/quizzes"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{adminAccessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const j = pm.response.json();
      pm.test('Has items array', () => pm.expect(j.items).to.be.an('array'));
      pm.test('Has totalCount', () => pm.expect(j.totalCount).to.be.a('number'));
    language: text/javascript
order: 1000
