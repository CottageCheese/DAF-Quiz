$kind: http-request
url: "{{baseUrl}}/api/admin/quizzes/{{quizId}}/questions"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "text": "What is 2 + 2?",
      "displayOrder": 1,
      "answers": [
        { "text": "4", "isCorrect": true },
        { "text": "3", "isCorrect": false },
        { "text": "5", "isCorrect": false },
        { "text": "6", "isCorrect": false }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{adminAccessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      const j = pm.response.json();
      pm.test('Has answers', () => pm.expect(j.answers).to.be.an('array').with.length.above(0));
      pm.environment.set('questionId', j.id);
      const correct = j.answers.find(a => a.isCorrect);
      if (correct) pm.environment.set('correctAnswerId', correct.id);
    language: text/javascript
order: 1000
