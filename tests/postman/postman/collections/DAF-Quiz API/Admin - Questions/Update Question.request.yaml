$kind: http-request
url: "{{baseUrl}}/api/admin/quizzes/{{quizId}}/questions/{{questionId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "text": "What is 3 + 3?",
      "displayOrder": 1,
      "answers": [
        { "text": "6", "isCorrect": true },
        { "text": "5", "isCorrect": false },
        { "text": "7", "isCorrect": false }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{adminAccessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Text updated', () => pm.expect(pm.response.json().text).to.equal('What is 3 + 3?'));
    language: text/javascript
order: 2000
