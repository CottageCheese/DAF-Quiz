$kind: http-request
url: "{{baseUrl}}/api/admin/quizzes/{{quizId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "title": "Postman Test Quiz",
      "publishedAt": "{{$isoTimestamp}}"
    }
auth:
  type: bearer
  credentials:
    token: "{{adminAccessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Published', () => pm.expect(pm.response.json().isPublished).to.be.true);
    language: text/javascript
order: 4000
