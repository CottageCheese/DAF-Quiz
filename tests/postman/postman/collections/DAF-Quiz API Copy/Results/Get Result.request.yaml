$kind: http-request
url: "{{baseUrl}}/api/quizzes/attempts/{{attemptId}}/result"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const j = pm.response.json();
      pm.test('AttemptId matches', () => pm.expect(j.attemptId).to.equal(parseInt(pm.environment.get('attemptId'))));
      pm.test('Percentage in range', () => {
        pm.expect(j.percentage).to.be.at.least(0);
        pm.expect(j.percentage).to.be.at.most(100);
      });
    language: text/javascript
order: 1000
