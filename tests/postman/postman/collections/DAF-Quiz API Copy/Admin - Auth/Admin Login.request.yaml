$kind: http-request
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "{{adminEmail}}",
      "password": "{{adminPassword}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const j = pm.response.json();
      pm.environment.set('adminAccessToken', j.accessToken);
      pm.environment.set('adminRefreshToken', j.refreshToken);
    language: text/javascript
order: 1000
