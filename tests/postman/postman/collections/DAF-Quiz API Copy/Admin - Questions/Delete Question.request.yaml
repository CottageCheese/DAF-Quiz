$kind: http-request
url: "{{baseUrl}}/api/admin/quizzes/{{quizId}}/questions/{{questionId}}"
method: DELETE
auth:
  type: bearer
  credentials:
    token: "{{adminAccessToken}}"
scripts:
  - type: afterResponse
    code: pm.test('Status 204', () => pm.response.to.have.status(204));
    language: text/javascript
order: 3000
