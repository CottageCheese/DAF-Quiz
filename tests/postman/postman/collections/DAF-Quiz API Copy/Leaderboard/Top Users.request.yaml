$kind: http-request
url: "{{baseUrl}}/api/leaderboard/top-users?count=10"
method: GET
queryParams:
  count: "10"
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const j = pm.response.json();
      pm.test('Is array', () => pm.expect(j).to.be.an('array'));
      pm.test('Count <= 10', () => pm.expect(j.length).to.be.at.most(10));
      if (j.length > 0) {
        pm.test('First rank is 1', () => pm.expect(j[0].rank).to.equal(1));
        pm.test('BestScorePercent in range', () => {
          pm.expect(j[0].bestScorePercent).to.be.at.least(0);
          pm.expect(j[0].bestScorePercent).to.be.at.most(100);
        });
      }
    language: text/javascript
order: 2000
