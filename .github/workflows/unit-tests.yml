name: Unit Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-dotnet:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test QuizProject.Tests.Integration/QuizProject.Tests.Integration.csproj --no-build --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: "**/*.trx"

  test-angular:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: quiz-angular/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: quiz-angular

      - name: Build
        run: npm run build
        working-directory: quiz-angular

      - name: Test
        run: xvfb-run --auto-servernum npm test -- --watch=false
        working-directory: quiz-angular
        env:
          CI: "true"
          CHROME_BIN: /usr/bin/google-chrome-stable
